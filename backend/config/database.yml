# backend/config/database.yml

default: &default
  adapter: postgresql
  encoding: unicode
  # 根據你的截圖，你的本地 PostgreSQL 連線名稱是 yen
  # 所以你的本機帳號高機率就是 yen，如果是其他名稱（例如你的 Mac 登入帳號 freea），請自行修改。
  username: yen
  password: 'test123'
  host: localhost
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  # 這是你要為目前專案建立的新資料庫名稱 (開發環境用)
  database: ai_anxiety_agent_development

test:
  <<: *default
  # Rails 會貼心地幫你多建一個測試用的資料庫
  database: ai_anxiety_agent_test

